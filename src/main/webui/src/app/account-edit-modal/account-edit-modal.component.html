<div class="modal-overlay" (click)="onCancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ getModalTitle() }}</h2>
      <button class="close-button" (click)="onCancel()" type="button">&times;</button>
    </div>

    @if (loading) {
      <div class="modal-body">
        <p>Loading...</p>
      </div>
    } @else {
      <form (ngSubmit)="onSave()">
        <div class="modal-body">
          @if (error) {
            <div class="error-message">{{ error }}</div>
          }

          <div class="form-group">
            <label for="name">Account Name *</label>
            <input
              type="text"
              id="name"
              [(ngModel)]="name"
              name="name"
              required
              placeholder="e.g., 1000 Cash"
              [disabled]="loading"
            />
          </div>

          <div class="form-group">
            <label for="type">Account Type *</label>
            <select
              id="type"
              [(ngModel)]="type"
              name="type"
              required
              [disabled]="loading"
            >
              @for (accountType of availableTypes; track accountType) {
                <option [value]="accountType">{{ accountType }}</option>
              }
            </select>
          </div>

          <div class="form-group">
            <label for="parent">Parent Account</label>
            <select
              id="parent"
              [(ngModel)]="selectedParentId"
              name="parent"
              [disabled]="loading || isAddingChild"
              class="parent-select"
            >
              <option [value]="null">None (Root Account)</option>
              @for (account of availableParents; track account.id) {
                <option [value]="account.id">{{ getAccountPath(account) }}</option>
              }
            </select>
            @if (isAddingChild) {
              <small class="form-hint">Adding as child of selected parent</small>
            }
          </div>

          <div class="form-group">
            <label for="note">Note</label>
            <textarea
              id="note"
              [(ngModel)]="note"
              name="note"
              rows="3"
              placeholder="Optional description"
              [disabled]="loading"
            ></textarea>
          </div>

          <div class="form-group">
            <label for="accountOrder">Display Order</label>
            <input
              type="number"
              id="accountOrder"
              [(ngModel)]="accountOrder"
              name="accountOrder"
              placeholder="Optional sort order"
              [disabled]="loading"
            />
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-secondary" (click)="onCancel()" [disabled]="loading">
            Cancel
          </button>
          <button type="submit" class="btn-primary" [disabled]="loading">
            {{ loading ? 'Saving...' : 'Save' }}
          </button>
        </div>
      </form>
    }
  </div>
</div>
