<div class="header">
    <div class="header-left">
        <img src="https://abstratium.dev/abstratium-logo-small.png" alt="Abstratium Logo" class="logo">
        <span class="brand-name">ABSTRATIUM</span>
    </div>

    <div class="header-right">
        <button 
            class="theme-toggle-btn" 
            (click)="toggleTheme()" 
            [attr.aria-label]="themeService.theme$() === 'light' ? 'Switch to dark mode' : 'Switch to light mode'"
            [title]="themeService.theme$() === 'light' ? 'Switch to dark mode' : 'Switch to light mode'">
            @if(themeService.theme$() === 'light') {
                🌙
            } @else {
                ☀️
            }
        </button>
        <a href="https://abstratium.dev/docs/legal">Legal</a>
        @if(isSignedIn) {
            &nbsp;|&nbsp;
            <a id="home-link" routerLink="/" routerLinkActive="inactive-link">🏠</a>
            &nbsp;|&nbsp;
            <select 
              id="journal-select" 
              [(ngModel)]="selectedJournalId" 
              (change)="onJournalSelected()"
              class="journal-selector">
              <option [ngValue]="null">-- Select a journal --</option>
              <option *ngFor="let journal of journals" [ngValue]="journal.id">
                {{ journal.title }} ({{ journal.currency }})
              </option>
              <option [ngValue]="IMPORT_OPTION">➕ Import Journal...</option>
            </select>
            &nbsp;|&nbsp;
            <a id="journal" routerLink="/journal" routerLinkActive="inactive-link">journal</a>
            &nbsp;|&nbsp;
            <a id="accounts" routerLink="/accounts" routerLinkActive="inactive-link">accounts</a>
            &nbsp;|&nbsp;
            <a id="reports" routerLink="/reports" routerLinkActive="inactive-link">reports</a>
            &nbsp;|&nbsp;
            <a id="settings-link" routerLink="/settings" routerLinkActive="inactive-link">⚙️ settings</a>
            &nbsp;|&nbsp;
            <a id="signout-link" class="alink" (click)="signout()">Sign out</a>
        }
    </div>
</div>
